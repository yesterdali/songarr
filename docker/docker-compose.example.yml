# Example deployment: Navidrome + Songarr Proxy + gluetun (VPN egress for yt-dlp).
#
# Clients point at http://<host>:4534 (the proxy) instead of Navidrome directly.
# yt-dlp traffic is routed through gluetun's HTTP proxy via `ytdlp_proxy` in
# songarr.toml (e.g. "http://gluetun:8888") — the proxy container itself is NOT
# behind the VPN, only yt-dlp egress is.

services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: "0"          # songarr triggers scans explicitly
    volumes:
      - ./data/navidrome:/data
      - ./data/music:/music:ro
    # No published port needed; reach it through the proxy. Uncomment to debug:
    # ports:
    #   - "4533:4533"

  songarr-proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - navidrome
      - gluetun
    ports:
      - "4534:4534"
    volumes:
      - ./data/songarr:/config       # songarr.toml + songarr.db live here
      - ./data/music:/music          # MUST be the same library Navidrome scans
      - ./data/staging:/staging
    # Optional Yandex Music integration. Generate a token with:
    #   docker compose run --rm songarr-proxy yandex login
    # Then inject it with your secret manager or .env file.
    environment:
      SONGARR_YANDEX_ENABLED: "${SONGARR_YANDEX_ENABLED:-false}"
      SONGARR_YANDEX_ACCESS_TOKEN: "${SONGARR_YANDEX_ACCESS_TOKEN:-}"
      SONGARR_YANDEX_REFRESH_TOKEN: "${SONGARR_YANDEX_REFRESH_TOKEN:-}"
      # Optional VK Music (play pasted vk.com/audio… links).
      SONGARR_VK_ENABLED: "${SONGARR_VK_ENABLED:-false}"
      SONGARR_VK_ACCESS_TOKEN: "${SONGARR_VK_ACCESS_TOKEN:-}"

  # Discord bot — plays Songarr in voice channels. Deliberately NOT behind
  # gluetun: it needs plain outbound to Discord (incl. voice UDP). It reaches
  # Songarr over the compose network by service name.
  songarr-discord:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    restart: unless-stopped
    depends_on:
      - songarr-proxy
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN:?set DISCORD_TOKEN in your .env}"
      # Your test server's ID makes slash commands appear instantly there;
      # leave empty for (slower, up to ~1h) global registration.
      DISCORD_TEST_GUILD: "${DISCORD_TEST_GUILD:-}"
      # Where the bot reaches Songarr. With this example's networking that's the
      # service name. If your Songarr uses `network_mode: "service:gluetun"`,
      # point this at gluetun's published port instead — e.g.
      # http://host.docker.internal:4534 with
      # `extra_hosts: ["host.docker.internal:host-gateway"]`.
      SONGARR_URL: "${SONGARR_URL:-http://songarr-proxy:4534}"
    volumes:
      - ./data/songarr-discord:/data   # per-user account links (sqlite)

  gluetun:
    image: qmcgaw/gluetun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # See https://github.com/qdm12/gluetun-wiki for your provider's settings.
      VPN_SERVICE_PROVIDER: "custom"
      VPN_TYPE: "wireguard"
      WIREGUARD_PRIVATE_KEY: "change-me"
      WIREGUARD_ADDRESSES: "10.0.0.2/32"
      VPN_ENDPOINT_IP: "203.0.113.1"
      VPN_ENDPOINT_PORT: "51820"
      WIREGUARD_PUBLIC_KEY: "change-me"
      # HTTP proxy consumed by yt-dlp (ytdlp_proxy = "http://gluetun:8888"):
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8888"
