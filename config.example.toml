[server]
bind = "0.0.0.0:4534"          # clients point HERE instead of Navidrome
db_path = "/config/songarr.db"

[navidrome]
base_url = "http://navidrome:4533"
# admin creds used ONLY for triggering scans + post-import verification,
# never for serving user requests (user auth is passed through untouched)
admin_user = "admin"
admin_password = "change-me"

[library]
music_dir = "/music"
ingest_subdir = "_songarr"      # imported singles land in /music/_songarr/Artist/…
staging_dir = "/staging"

[external_search]
enabled = true
provider = "deezer"             # deezer | ytmusic | yandex | both
max_results = 8                 # virtual results appended per search
min_query_len = 3

[streaming]
ytdlp_path = "yt-dlp"
ytdlp_proxy = ""                # e.g. "http://gluetun:8888" — REQUIRED in RU deployments
innertube = false               # native fast path (~1s to audio); falls back to yt-dlp on failure.
                                # Off by default: without a PO token googlevideo serves only the
                                # first ~1 MiB, so on token-gated egress IPs (datacenter/proxy)
                                # it always falls back. Enable only on residential-grade egress.
format = "opus"                 # transcode target for live pipe: opus | mp3
bitrate_kbps = 160
max_concurrent = 3
timeout_first_byte_secs = 12    # if yt-dlp produces nothing by then → 503 to client

[ingest]
auto_import = true              # move played tracks into /music
min_score_for_import = 80       # candidate match score gate
write_playlist = "Songarr Played.m3u"  # optional rolling playlist of imports, "" disables

[recommendations]
enabled = true                  # getSimilarSongs/getSimilarSongs2/getTopSongs via R2 ensemble
max_results = 20
shown_cooldown_days = 7
cache_ttl_hours = 72
weight_ytm = 1.0
weight_deezer = 0.6
weight_lastfm = 0.8             # requires lastfm_api_key
weight_yandex = 1.2             # requires [yandex].enabled + token
lastfm_api_key = ""

[yandex]
enabled = false                 # uses unofficial yandex-music-api helper
helper_path = "/usr/local/bin/songarr-yandex"
access_token = ""               # prefer SONGARR_YANDEX_ACCESS_TOKEN / Docker secret injection
refresh_token = ""              # optional, reserved for helper refresh support
use_for_wave = true
use_for_search = true
use_for_import = true           # Yandex-origin tracks try Yandex audio before YouTube fallback
api_timeout_secs = 10

[vk]
enabled = false                 # play pasted vk.com/audio… links (yt-dlp has no VK audio extractor)
helper_path = "/usr/local/bin/songarr-vk"
access_token = ""               # Kate-Mobile token w/ audio scope; get one via `songarr-vk login`.
                                # prefer SONGARR_VK_ACCESS_TOKEN / Docker secret injection
api_timeout_secs = 15           # VK audio is encrypted HLS; allow extra headroom

[artist_expansion]
enabled = true                  # show external provider albums under getArtist
max_albums = 12
max_tracks_per_album = 30
cache_ttl_hours = 168
include_singles = true
include_top_tracks_album = true
min_artist_match_score = 70     # Cyrillic/Latin resolver confidence gate

[lyrics]
enabled = true                  # getLyricsBySongId fallback via LRCLIB
lrclib_api_base = "https://lrclib.net"

[upgrade]
mode = "none"                   # none | soulsync_wishlist (best-effort, see M6)
soulsync_url = "http://soulsync:8888"

[users]
default_can_trigger_downloads = true
deny = []                       # usernames who get passthrough-only (no virtual results)
